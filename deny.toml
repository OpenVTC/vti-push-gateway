# cargo-deny configuration — supply-chain gate for the push gateway.
# Run with: cargo deny check
#
# Scope: keep the dependency tree free of known-vulnerable crates (notably the
# RustCrypto `rsa` Marvin-Attack advisory, which this crate is built to avoid —
# see Cargo.toml's web-push-native/p256 notes) and restrict licenses to a
# permissive allow-list.

[advisories]
# Fail on any security vulnerability or unsound advisory. Specific IDs may be
# suppressed below with a documented justification.
ignore = [
  # proc-macro-error is unmaintained (RUSTSEC-2024-0370). It is a *build-time*
  # proc-macro helper pulled transitively by the Affinidi DID stack
  # (linked-data-derive → linked-data → json-ld → ssi-* → affinidi-*), not a
  # runtime dependency, and the advisory is "unmaintained", not a
  # vulnerability. Nothing we control selects it; revisit when the affinidi
  # crates drop it.
  "RUSTSEC-2024-0370",
]

[licenses]
# Permissive licenses present in the current tree. OR-expressions (e.g.
# "MIT OR Apache-2.0") are satisfied by any one allowed term.
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-1-Clause",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
# Allow duplicate versions (the affinidi/transitive tree carries several);
# flag only wildcard version requirements, which we don't use.
multiple-versions = "allow"
wildcards = "deny"

[sources]
# Only crates.io. Add git sources here explicitly if ever needed.
unknown-registry = "deny"
unknown-git = "deny"
